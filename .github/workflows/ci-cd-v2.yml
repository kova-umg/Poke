name: ci-cd

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    project-lint:
        runs-on: ubuntu-24.04
        steps:
            -   uses: actions/checkout@v6
            -   uses: ./.github/actions/setup-pnpm-ci-cd
            -   name: Use EsLint
                run: pnpm run lint

        #    -   name: Test
        #        run: pnpm test

    build:
        runs-on: ubuntu-24.04
        needs: [project-lint]
        steps:
            -   uses: actions/checkout@v6
            -   uses: ./.github/actions/setup-pnpm-ci-cd
            -   name: Build
                run: pnpm build